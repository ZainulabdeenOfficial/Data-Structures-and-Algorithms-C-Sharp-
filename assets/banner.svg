<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" role="img" aria-labelledby="title desc">
  <title id="title">Data Structures and Algorithms in C#</title>
  <desc id="desc">Professional banner for the Data Structures and Algorithms in C# repository.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140f2d"/>
      <stop offset="55%" stop-color="#241b57"/>
      <stop offset="100%" stop-color="#1767ff"/>
    </linearGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
    <linearGradient id="codeChip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f9d55"/>
      <stop offset="100%" stop-color="#31c48d"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#070b1a" flood-opacity="0.35"/>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#grid)" opacity="0.7"/>

  <circle cx="1280" cy="95" r="160" fill="url(#glowPurple)" filter="url(#softBlur)"/>
  <circle cx="1335" cy="200" r="135" fill="url(#glowGreen)" filter="url(#softBlur)"/>
  <circle cx="220" cy="440" r="170" fill="#2563eb" opacity="0.35" filter="url(#softBlur)"/>

  <rect x="92" y="84" width="10" height="332" rx="5" fill="url(#accent)"/>

  <text x="130" y="118" fill="#9cc4ff" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="4">
    PROFESSIONAL LEARNING RESOURCE
  </text>

  <text x="130" y="196" fill="#ffffff" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="58" font-weight="800">
    DATA STRUCTURES &amp; ALGORITHMS
  </text>

  <text x="130" y="242" fill="#e5e7eb" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="1.5">
    IN C# PROGRAMMING
  </text>

  <text x="130" y="309" fill="#f8fafc" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="21" font-weight="500">
    Master the fundamentals with practical examples, clear theory, and interview-ready implementations.
  </text>
  <text x="130" y="342" fill="#f8fafc" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="21" font-weight="500">
    Learn, build, and optimize core data structures and algorithms with confidence.
  </text>

  <g transform="translate(130 381)">
    <rect width="138" height="44" rx="22" fill="url(#codeChip)"/>
    <text x="69" y="29" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="800">
      C#
    </text>
  </g>

  <g transform="translate(284 381)">
    <rect width="220" height="44" rx="22" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="110" y="28" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="700">
      Hands-on • Structured • Clear
    </text>
  </g>

  <g filter="url(#dropShadow)">
    <rect x="1035" y="88" width="320" height="324" rx="28" fill="#ffffff" fill-opacity="0.08" stroke="url(#panelStroke)"/>

    <text x="1074" y="130" fill="#ffffff" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="700">
      Core Concepts
    </text>
    <text x="1074" y="156" fill="#cbd5e1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="600" letter-spacing="1.5">
