    </text>

    <line x1="1124" y1="212" x2="1208" y2="168" stroke="#60a5fa" stroke-width="4" stroke-linecap="round"/>
    <line x1="1124" y1="212" x2="1208" y2="256" stroke="#60a5fa" stroke-width="4" stroke-linecap="round"/>
    <line x1="1208" y1="168" x2="1290" y2="212" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
    <line x1="1208" y1="256" x2="1290" y2="212" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    <line x1="1290" y1="212" x2="1290" y2="298" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>

    <circle cx="1124" cy="212" r="26" fill="#0f172a" stroke="#60a5fa" stroke-width="4"/>
    <circle cx="1208" cy="168" r="24" fill="#0f172a" stroke="#8b5cf6" stroke-width="4"/>
    <circle cx="1208" cy="256" r="24" fill="#0f172a" stroke="#22c55e" stroke-width="4"/>
    <circle cx="1290" cy="212" r="26" fill="#0f172a" stroke="#f8fafc" stroke-width="4"/>
    <circle cx="1290" cy="298" r="24" fill="#0f172a" stroke="#f59e0b" stroke-width="4"/>

    <text x="1124" y="218" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="800">DS</text>
    <text x="1208" y="174" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="12" font-weight="800">O(1)</text>
    <text x="1208" y="262" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="12" font-weight="800">O(n)</text>
    <text x="1290" y="218" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="800">ALG</text>
    <text x="1290" y="304" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="12" font-weight="800">OPT</text>

    <rect x="1074" y="338" width="111" height="34" rx="17" fill="#3b82f6" fill-opacity="0.18" stroke="#60a5fa" stroke-opacity="0.45"/>
    <rect x="1193" y="338" width="126" height="34" rx="17" fill="#22c55e" fill-opacity="0.16" stroke="#4ade80" stroke-opacity="0.4"/>
    <text x="1129.5" y="360" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="700">Algorithms</text>
    <text x="1256" y="360" text-anchor="middle" fill="#dcfce7" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14" font-weight="700">Complexity</text>
  </g>
</svg>
